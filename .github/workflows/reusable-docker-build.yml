name: Reusable Docker Build
on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
        description: 'The image name (without registry prefix)'
      service_tag:
        required: true
        type: string
        description: 'Service-specific tag (e.g. ui, orchestrator, risk)'
      context:
        required: true
        type: string
        description: 'Docker build context path'
      dockerfile:
        required: true
        type: string
        description: 'Path to Dockerfile'
    secrets:
      QUAY_USERNAME:
        required: true
      QUAY_PASSWORD:
        required: true
env:
  REGISTRY: quay.io
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Quay.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ inputs.image_name }}
          tags: |
            type=raw,value=${{ inputs.service_tag }},enable={{is_default_branch}}
            type=raw,value=${{ inputs.service_tag }}-{{sha}},enable={{is_default_branch}}
            type=ref,event=pr,prefix=${{ inputs.service_tag }}-pr-
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
