name: Frontend Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/test-frontend.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Production build
        working-directory: frontend
        env:
          VITE_OPENAI_API_ENDPOINT: https://example.com/v1
          VITE_OPENAI_API_TOKEN: ci
          VITE_OPENAI_MODEL: ci-model
          VITE_ORCHESTRATOR_URL: /api/chat
        run: npm run build
