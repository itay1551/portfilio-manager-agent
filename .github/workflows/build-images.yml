name: Build and Push Images
on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'orchestrator/**'
      - 'tools/**'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'orchestrator/**'
      - 'tools/**'
  workflow_dispatch:
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
      orchestrator: ${{ steps.filter.outputs.orchestrator }}
      risk: ${{ steps.filter.outputs.risk }}
      portfolio: ${{ steps.filter.outputs.portfolio }}
      guidelines: ${{ steps.filter.outputs.guidelines }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ui:
              - 'frontend/**'
            orchestrator:
              - 'orchestrator/**'
            risk:
              - 'tools/value_at_risk/**'
            portfolio:
              - 'tools/portfolio/**'
            guidelines:
              - 'tools/guidelines/**'
  build-matrix:
    runs-on: ubuntu-latest
    needs: detect-changes
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_services: ${{ steps.set-matrix.outputs.has_services }}
    steps:
      - name: Build matrix from changed services
        id: set-matrix
        run: |
          services='[]'

          # On workflow_dispatch, build all services
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            services='[
              {"name":"ui","image_name":"ikatav/portfolio-manager-agent","service_tag":"ui","context":"./frontend","dockerfile":"./frontend/Dockerfile"},
              {"name":"orchestrator","image_name":"ikatav/portfolio-manager-agent","service_tag":"orchestrator","context":"./orchestrator/src","dockerfile":"./orchestrator/src/Dockerfile"},
              {"name":"risk","image_name":"ikatav/portfolio-manager-agent","service_tag":"risk","context":"./tools/value_at_risk/src","dockerfile":"./tools/value_at_risk/src/Dockerfile"},
              {"name":"portfolio","image_name":"ikatav/portfolio-manager-agent","service_tag":"portfolio","context":"./tools/portfolio/src","dockerfile":"./tools/portfolio/src/Dockerfile"},
              {"name":"guidelines","image_name":"ikatav/portfolio-manager-agent","service_tag":"guidelines","context":"./tools/guidelines/src","dockerfile":"./tools/guidelines/src/Dockerfile"}
            ]'
          else
            services='[]'
            if [ "${{ needs.detect-changes.outputs.ui }}" = "true" ]; then
              services=$(echo "$services" | jq -c '. + [{"name":"ui","image_name":"ikatav/portfolio-manager-agent","service_tag":"ui","context":"./frontend","dockerfile":"./frontend/Dockerfile"}]')
            fi
            if [ "${{ needs.detect-changes.outputs.orchestrator }}" = "true" ]; then
              services=$(echo "$services" | jq -c '. + [{"name":"orchestrator","image_name":"ikatav/portfolio-manager-agent","service_tag":"orchestrator","context":"./orchestrator/src","dockerfile":"./orchestrator/src/Dockerfile"}]')
            fi
            if [ "${{ needs.detect-changes.outputs.risk }}" = "true" ]; then
              services=$(echo "$services" | jq -c '. + [{"name":"risk","image_name":"ikatav/portfolio-manager-agent","service_tag":"risk","context":"./tools/value_at_risk/src","dockerfile":"./tools/value_at_risk/src/Dockerfile"}]')
            fi
            if [ "${{ needs.detect-changes.outputs.portfolio }}" = "true" ]; then
              services=$(echo "$services" | jq -c '. + [{"name":"portfolio","image_name":"ikatav/portfolio-manager-agent","service_tag":"portfolio","context":"./tools/portfolio/src","dockerfile":"./tools/portfolio/src/Dockerfile"}]')
            fi
            if [ "${{ needs.detect-changes.outputs.guidelines }}" = "true" ]; then
              services=$(echo "$services" | jq -c '. + [{"name":"guidelines","image_name":"ikatav/portfolio-manager-agent","service_tag":"guidelines","context":"./tools/guidelines/src","dockerfile":"./tools/guidelines/src/Dockerfile"}]')
            fi
          fi

          has_services="false"
          if [ "$(echo "$services" | jq 'length')" -gt 0 ]; then
            has_services="true"
          fi

          echo "matrix={\"service\":$services}" >> "$GITHUB_OUTPUT"
          echo "has_services=$has_services" >> "$GITHUB_OUTPUT"
  build:
    needs: build-matrix
    if: needs.build-matrix.outputs.has_services == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}
    uses: ./.github/workflows/reusable-docker-build.yml
    permissions:
      contents: read
      packages: write
    with:
      image_name: ${{ matrix.service.image_name }}
      service_tag: ${{ matrix.service.service_tag }}
      context: ${{ matrix.service.context }}
      dockerfile: ${{ matrix.service.dockerfile }}
    secrets:
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
