name: E2E Tests (MicroShift)
on:
  pull_request:
    branches: [main]
    paths:
      - 'deploy/helm/**'
      - 'ci/**'
      - 'tests/integration/**'
      - '.github/workflows/e2e-microshift.yml'
  push:
    branches: [main]
    paths:
      - 'deploy/helm/**'
      - 'ci/**'
      - 'tests/integration/**'
  workflow_dispatch:
    inputs:
      skip_image_cache:
        description: 'Skip image build/cache — pull from registry at runtime (faster iteration)'
        type: boolean
        default: false
env:
  KUBECONFIG: /tmp/microshift-kubeconfig
  NAMESPACE: ci-e2e
  APP_REPO: quay.io/ikatav/portfolio-manager-agent
jobs:
  e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      OPENAI_API_TOKEN: ${{ secrets.OPENAI_API_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Resolve MicroShift release tag
        id: microshift-tag
        run: |
          TAG=$(curl -sf --max-time 30 \
            "https://api.github.com/repos/microshift-io/microshift/releases/latest" \
            | jq -r .tag_name) || true
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            TAG="4.21.0_g29f429c21_4.21.0_okd_scos.ec.15"
            echo "::warning::GitHub API rate-limited; using fallback tag $TAG"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Cache MicroShift bootc image
        if: ${{ !inputs.skip_image_cache }}
        uses: actions/cache@v4
        with:
          path: /tmp/cache/microshift.tar
          key: microshift-bootc-${{ steps.microshift-tag.outputs.tag }}
      - name: Cache app container images
        if: ${{ !inputs.skip_image_cache }}
        uses: actions/cache@v4
        with:
          path: /tmp/cache/app-images.tar
          key: app-images-v2-${{ hashFiles('build-script/**', 'deploy/helm/values.yaml') }}
          restore-keys: app-images-v2-
      - name: Cache guidelines-model image
        if: ${{ !inputs.skip_image_cache }}
        uses: actions/cache@v4
        with:
          path: /tmp/cache/guidelines-model.tar
          key: guidelines-model-v2-${{ hashFiles('tools/guidelines-model/**', 'models/investment-guidelines-mlp.joblib') }}
      - name: Cache tests image
        if: ${{ !inputs.skip_image_cache }}
        uses: actions/cache@v4
        with:
          path: /tmp/cache/tests.tar
          key: tests-image-v2-${{ hashFiles('tests/Dockerfile', 'tests/requirements.txt', 'orchestrator/src/requirements.txt') }}
      - name: Cache oc CLI
        id: cache-oc
        uses: actions/cache@v4
        with:
          path: /tmp/cache/oc
          key: oc-cli-stable-v1
      - name: Install CLI tools
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - name: Install oc CLI
        run: |
          if [ -f /tmp/cache/oc ]; then
            sudo cp /tmp/cache/oc /usr/local/bin/oc
            sudo chmod +x /usr/local/bin/oc
          else
            curl -sL https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz \
              | sudo tar -xz -C /usr/local/bin oc kubectl
            mkdir -p /tmp/cache
            cp /usr/local/bin/oc /tmp/cache/oc
          fi
      - name: Setup MicroShift and build images (parallel)
        run: |
          export MICROSHIFT_IMAGE_CACHE=/tmp/cache/microshift.tar
          export MICROSHIFT_TAG="${{ steps.microshift-tag.outputs.tag }}"
          ci/setup-microshift.sh &
          MICROSHIFT_PID=$!

          FAST="${{ inputs.skip_image_cache }}"
          if [ "$FAST" != "true" ]; then
            mkdir -p /tmp/cache

            if [ -f /tmp/cache/guidelines-model.tar ]; then
              echo ">>> Loading guidelines-model from cache..."
              sudo podman load -i /tmp/cache/guidelines-model.tar
            else
              echo ">>> Building guidelines-model (cache miss)..."
              sudo podman build -t "${APP_REPO}:guidelines-model" \
                -f tools/guidelines-model/Dockerfile .
              sudo podman save -o /tmp/cache/guidelines-model.tar \
                "${APP_REPO}:guidelines-model"
              sudo chown "$(id -u):$(id -g)" /tmp/cache/guidelines-model.tar
            fi

            if [ -f /tmp/cache/tests.tar ]; then
              echo ">>> Loading tests image from cache..."
              sudo podman load -i /tmp/cache/tests.tar
            else
              echo ">>> Building tests image (cache miss)..."
              sudo podman build -t "${APP_REPO}:tests" \
                -f tests/Dockerfile .
              sudo podman save -o /tmp/cache/tests.tar "${APP_REPO}:tests"
              sudo chown "$(id -u):$(id -g)" /tmp/cache/tests.tar
            fi

            if [ -f /tmp/cache/app-images.tar ]; then
              echo ">>> Loading app images from cache..."
              sudo podman load -i /tmp/cache/app-images.tar
            else
              echo ">>> Pulling app images (cache miss)..."
              for tag in ui orchestrator risk portfolio guidelines; do
                sudo podman pull "${APP_REPO}:${tag}"
              done
              sudo podman save -o /tmp/cache/app-images.tar \
                "${APP_REPO}:ui" \
                "${APP_REPO}:orchestrator" \
                "${APP_REPO}:risk" \
                "${APP_REPO}:portfolio" \
                "${APP_REPO}:guidelines"
              sudo chown "$(id -u):$(id -g)" /tmp/cache/app-images.tar
            fi
          else
            echo ">>> Fast mode: pulling tests image only..."
            sudo podman pull "${APP_REPO}:tests"
          fi

          echo ">>> Waiting for MicroShift setup to finish..."
          wait $MICROSHIFT_PID

          if [ "$FAST" != "true" ]; then
            echo ">>> Loading app images into MicroShift (per-image)..."
            for tag in ui orchestrator risk portfolio guidelines guidelines-model; do
              echo "  Loading ${tag}..."
              sudo podman save "${APP_REPO}:${tag}" \
                | sudo podman exec -i microshift-okd-1 podman load
            done
          fi
      - name: Create namespace and prerequisites
        run: |
          oc create namespace "$NAMESPACE" 2>/dev/null || true

          oc create secret generic guidelines-docs \
            --from-file=investment-guidelines.pdf=tools/guidelines/docs/client-100/investment-guidelines.pdf \
            -n "$NAMESPACE"
      - name: Deploy app via Helm
        run: >
          make deploy-cluster NAMESPACE="$NAMESPACE" HELM_ARGS='--set guidelines.inferenceUrl=""'

      - name: Wait for rollouts
        run: |
          DEPLOYMENTS=(
            ui
            orchestrator
            investment-advisor-agent-risk
            investment-advisor-agent-portfolio
            investment-advisor-agent-guidelines
          )
          for dep in "${DEPLOYMENTS[@]}"; do
            echo "Waiting for $dep ..."
            oc rollout status "deployment/$dep" -n "$NAMESPACE" --timeout=180s
          done

          echo "Waiting for minio (best-effort, needs PV provisioner)..."
          oc rollout status deployment/minio -n "$NAMESPACE" --timeout=30s || true

          echo "Waiting for model-upload Job (best-effort, needs minio)..."
          oc wait --for=condition=Complete job/model-upload \
            -n "$NAMESPACE" --timeout=30s || true

          echo "Waiting for InferenceService (best-effort, needs KServe controller)..."
          oc wait --for=condition=Ready isvc/guidelines-mlp \
            -n "$NAMESPACE" --timeout=10s || true
      - name: Setup route networking
        run: |
          MICROSHIFT_IP=$(sudo podman inspect microshift-okd-1 \
            | jq -r '.[0].NetworkSettings.Networks | to_entries[0].value.IPAddress')

          for route in $(oc get routes -n "$NAMESPACE" -o jsonpath='{.items[*].spec.host}' 2>/dev/null); do
            echo "$MICROSHIFT_IP $route" | sudo tee -a /etc/hosts
          done

          echo ""
          echo "Route hostnames mapped to $MICROSHIFT_IP:"
          oc get routes -n "$NAMESPACE" || true
      - name: Resolve route URLs
        id: routes
        run: |
          echo "UI_BASE=http://$(oc get route ui -n "$NAMESPACE" -o jsonpath='{.spec.host}')" >> "$GITHUB_OUTPUT"
          echo "ORCH_BASE=http://$(oc get route orchestrator -n "$NAMESPACE" -o jsonpath='{.spec.host}')" >> "$GITHUB_OUTPUT"
          GUARDRAILS=$(oc get route guardrails -n "$NAMESPACE" -o jsonpath='{.spec.host}' 2>/dev/null || true)
          [ -n "$GUARDRAILS" ] && echo "GUARDRAILS_BASE=http://$GUARDRAILS" >> "$GITHUB_OUTPUT" || true
      - name: Run integration tests (no LLM)
        run: |
          sudo podman run --rm --network=host \
            -v "${{ github.workspace }}:/workspace:ro,Z" \
            -v /usr/local/bin/oc:/usr/local/bin/oc:ro \
            -v "${KUBECONFIG}:${KUBECONFIG}:ro" \
            -e KUBECONFIG="${KUBECONFIG}" \
            -e NAMESPACE="${NAMESPACE}" \
            -e UI_BASE="${{ steps.routes.outputs.UI_BASE }}" \
            -e ORCH_BASE="${{ steps.routes.outputs.ORCH_BASE }}" \
            -e GUARDRAILS_BASE="${{ steps.routes.outputs.GUARDRAILS_BASE }}" \
            "${APP_REPO}:tests" \
            tests/integration \
            -m "integration and not llm and not local_only and not requires_controllers" -v
      - name: Run E2E tests (LLM)
        if: env.OPENAI_API_TOKEN != ''
        run: |
          sudo podman run --rm --network=host \
            -v "${{ github.workspace }}:/workspace:ro,Z" \
            -v /usr/local/bin/oc:/usr/local/bin/oc:ro \
            -v "${KUBECONFIG}:${KUBECONFIG}:ro" \
            -e KUBECONFIG="${KUBECONFIG}" \
            -e NAMESPACE="${NAMESPACE}" \
            -e UI_BASE="${{ steps.routes.outputs.UI_BASE }}" \
            -e ORCH_BASE="${{ steps.routes.outputs.ORCH_BASE }}" \
            -e GUARDRAILS_BASE="${{ steps.routes.outputs.GUARDRAILS_BASE }}" \
            -e OPENAI_API_ENDPOINT="${{ secrets.OPENAI_API_ENDPOINT }}" \
            -e OPENAI_API_TOKEN="${{ env.OPENAI_API_TOKEN }}" \
            -e OPENAI_MODEL="${{ secrets.OPENAI_MODEL }}" \
            "${APP_REPO}:tests" \
            tests/integration/test_e2e.py -v
      - name: Collect debug info on failure
        if: failure()
        run: |
          echo "=== Pods ==="
          oc get pods -n "$NAMESPACE" -o wide || true
          echo ""
          echo "=== Events ==="
          oc get events -n "$NAMESPACE" --sort-by=.lastTimestamp | tail -30 || true
          echo ""
          echo "=== Pod logs ==="
          for dep in ui orchestrator investment-advisor-agent-risk \
                     investment-advisor-agent-portfolio investment-advisor-agent-guidelines; do
            echo "--- $dep ---"
            oc logs "deploy/$dep" -n "$NAMESPACE" --tail=50 || true
          done
          echo ""
          echo "=== InferenceService ==="
          oc get isvc -n "$NAMESPACE" -o yaml || true
          echo ""
          echo "=== NemoGuardrails ==="
          oc get nemoguardrails -n "$NAMESPACE" -o yaml || true
      - name: Cleanup
        if: always()
        run: |
          helm uninstall investment-advisor-agent -n "$NAMESPACE" 2>/dev/null || true
          cd /tmp/microshift-upstream && make clean 2>/dev/null || true
