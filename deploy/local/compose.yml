services:
  ui:
    build:
      context: ../../frontend
      args:
        VITE_ORCHESTRATOR_URL: /api/chat
        VITE_OPENAI_API_ENDPOINT: ${OPENAI_API_ENDPOINT:-}
        VITE_OPENAI_API_TOKEN: ${OPENAI_API_TOKEN:-}
        VITE_OPENAI_MODEL: ${OPENAI_MODEL:-}
    ports:
      - "8080:8080"
    env_file:
      - path: ../../.env
        required: false
    depends_on:
      orchestrator:
        condition: service_started
    restart: unless-stopped
  orchestrator:
    build:
      context: ../../orchestrator/src
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      PYTHONUNBUFFERED: "1"
      TOOL_SERVERS: >-
        http://risk:7001, http://portfolio:7002, http://guidelines:7003
      GUARDRAILS_URL: "http://guardrails:8000"
    depends_on:
      risk:
        condition: service_started
      portfolio:
        condition: service_started
      guidelines:
        condition: service_started
      guardrails:
        condition: service_started
    restart: unless-stopped
  guardrails:
    build:
      context: ../../tools/guardrails/src
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      PYTHONUNBUFFERED: "1"
      GUARDRAILS_CONFIG_PATH: "/config"
    volumes:
      - ../../tools/guardrails/config:/config:ro,z
    restart: unless-stopped
  risk:
    build:
      context: ../../tools/value_at_risk/src
    ports:
      - "7001:7001"
    environment:
      PORT: "7001"
      PYTHONUNBUFFERED: "1"
    restart: unless-stopped
  portfolio:
    build:
      context: ../../tools/portfolio/src
    ports:
      - "7002:7002"
    environment:
      PORT: "7002"
      PYTHONUNBUFFERED: "1"
    restart: unless-stopped
  minio:
    image: docker.io/minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    restart: unless-stopped
  model-upload:
    image: docker.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_started
      mlserver:
        condition: service_started
    entrypoint: /bin/sh
    command:
      - -c
      - |
        for i in $$(seq 1 30); do
          mc alias set minio http://minio:9000 minioadmin minioadmin && break
          echo "Waiting for MinIO... ($$i/30)"
          sleep 2
        done
        mc mb --ignore-existing minio/models
        echo "MinIO bucket ready (model served from MLServer image locally)"
    restart: "no"
  mlserver:
    build:
      context: ../..
      dockerfile: tools/guidelines-model/Dockerfile
    ports:
      - "8081:8080"
    restart: unless-stopped
  guidelines:
    build:
      context: ../../tools/guidelines/src
    ports:
      - "7003:7003"
    environment:
      PORT: "7003"
      PYTHONUNBUFFERED: "1"
      INFERENCE_URL: "http://mlserver:8080"
    volumes:
      - ../../tools/guidelines/docs:/app/docs:ro,z
    depends_on:
      mlserver:
        condition: service_started
    restart: unless-stopped
volumes:
  minio-data:
