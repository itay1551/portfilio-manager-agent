{{- if .Values.guardrails.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: guardrails-config
  namespace: {{ .Values.namespace }}
data:
  config.yaml: |
    rails:
      config:
        sensitive_data_detection:
          input:
            entities:
              - CREDIT_CARD
              - US_SSN
              - PHONE_NUMBER
          output:
            entities:
              - CREDIT_CARD
              - US_SSN
              - PHONE_NUMBER
        regex_detection:
          input:
            patterns:
              - "\\b(password|secret|api[_-]?key|token)\\b"
              - "\\d{3}-\\d{2}-\\d{4}"
            case_insensitive: true
      input:
        flows:
          - detect sensitive data on input
          - regex check input
          - check financial topic
      output:
        flows:
          - detect sensitive data on output
  rails.co: |
    define flow check financial topic
      $result = execute check_financial_topic
      if $result == "blocked"
        bot inform off topic
        stop

    define bot inform off topic
      "I can only help with investment and portfolio-related questions. Please ask about your portfolio, risk, or investment guidelines."
  actions.py: |
    from typing import Optional
    from nemoguardrails.actions import action

    OFF_TOPIC_KEYWORDS = [
        "recipe", "cooking", "weather forecast", "sports score",
        "write me a poem", "tell me a joke", "song lyrics",
        "movie review", "game walkthrough",
    ]

    @action(is_system_action=True)
    async def check_financial_topic(context: Optional[dict] = None) -> str:
        """Block messages that are clearly unrelated to finance/investments."""
        user_message = (context or {}).get("user_message", "").lower()
        for keyword in OFF_TOPIC_KEYWORDS:
            if keyword in user_message:
                return "blocked"
        return "allowed"
{{- end }}
