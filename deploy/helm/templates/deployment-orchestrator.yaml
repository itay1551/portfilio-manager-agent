apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
        - name: container
          image: {{ .Values.image.repository }}:{{ .Values.image.tags.orchestrator }}
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: PORT
              value: "5000"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: TOOL_SERVERS
              value: "http://investment-advisor-agent-risk:7001,http://investment-advisor-agent-portfolio:7002,http://investment-advisor-agent-guidelines:7003"
            {{- if .Values.guardrails.enabled }}
            - name: GUARDRAILS_URL
              value: "http://guardrails-internal:8000"
            {{- end }}
