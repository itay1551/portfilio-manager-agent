apiVersion: apps/v1
kind: Deployment
metadata:
  name: investment-advisor-agent-risk
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: investment-advisor-agent-risk
  template:
    metadata:
      labels:
        app: investment-advisor-agent-risk
    spec:
      containers:
        - name: container
          image: {{ .Values.image.repository }}:{{ .Values.image.tags.risk }}
          ports:
            - containerPort: 7001
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /tools
              port: 7001
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: PORT
              value: "7001"
            - name: PYTHONUNBUFFERED
              value: "1"
