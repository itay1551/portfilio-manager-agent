apiVersion: apps/v1
kind: Deployment
metadata:
  name: investment-advisor-agent-guidelines
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: investment-advisor-agent-guidelines
  template:
    metadata:
      labels:
        app: investment-advisor-agent-guidelines
    spec:
      volumes:
        - name: guidelines-docs
          secret:
            secretName: guidelines-docs
      containers:
        - name: container
          image: {{ .Values.image.repository }}:{{ .Values.image.tags.guidelines }}
          ports:
            - containerPort: 7003
              protocol: TCP
          env:
            - name: PORT
              value: "7003"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: MODEL_PATH
              value: "models/investment-guidelines-mlp.joblib"
            - name: INFERENCE_URL
              value: {{ .Values.guidelines.inferenceUrl | quote }}
          volumeMounts:
            - name: guidelines-docs
              mountPath: /app/docs/client-100/investment-guidelines.pdf
              subPath: investment-guidelines.pdf
              readOnly: true
