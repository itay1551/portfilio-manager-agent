apiVersion: apps/v1
kind: Deployment
metadata:
  name: neurosymbolic-ai-guidelines
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: neurosymbolic-ai-guidelines
  template:
    metadata:
      labels:
        app: neurosymbolic-ai-guidelines
    spec:
      containers:
        - name: container
          image: {{ .Values.image.registry }}/neurosymbolic-ai-guidelines:{{ .Values.image.tag }}
          ports:
            - containerPort: 7003
              protocol: TCP
