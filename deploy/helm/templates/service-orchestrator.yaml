apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: orchestrator
  ports:
    - name: http
      protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: orchestrator
  namespace: {{ .Values.namespace }}
spec:
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Allow
  to:
    kind: Service
    name: orchestrator
    weight: 100
  port:
    targetPort: http
