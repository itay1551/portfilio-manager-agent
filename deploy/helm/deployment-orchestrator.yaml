apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: neurosymbolic-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
        - name: container
          image: quay.io/aric-rosenbaum/neurosymbolic-ai/orchestrator:latest
          ports:
            - containerPort: 5000
              protocol: TCP